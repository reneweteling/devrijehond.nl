<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>De Vrije Hond — mobiele wireframes</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Inter:wght@400;500&display=swap');
:root{
  --color-background-primary:#fff;--color-background-secondary:#F3EFE3;--color-background-tertiary:#ECE7D8;
  --color-text-primary:#2C2A1E;--color-text-secondary:#5E5A48;--color-text-tertiary:#908B79;
  --color-border-tertiary:rgba(60,50,20,.14);--color-border-secondary:rgba(60,50,20,.30);
  --border-radius-md:10px;--border-radius-lg:12px;--border-radius-xl:16px;
  --teal:#6E7B33;--teal-bg:#E7E9D5;--teal-tx:#4C5622;--accent:#C2762E;--accent-tx:#8A4F1B;
}
*{box-sizing:border-box;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif}
body{margin:0;background:#E4DEC9;color:var(--color-text-primary);padding:24px 12px;display:flex;justify-content:center}
.wrap{width:100%;max-width:680px}
.title,.scr-h,.center h3,.wm{font-family:'Poppins',sans-serif}
</style>
</head>
<body>
<div class="wrap" id="dvh-root"></div>
<script>
const ROOT_STYLE = `
.dvh-nav{display:flex;flex-wrap:wrap;gap:6px;margin:0 12px 16px;justify-content:center}
.dvh-nav button{font-size:12px;padding:5px 10px;border:.5px solid var(--color-border-secondary);background:var(--color-background-primary);
  border-radius:var(--border-radius-md);color:var(--color-text-secondary);cursor:pointer}
.dvh-nav button.on{background:var(--teal-bg);color:var(--teal-tx);border-color:var(--teal)}
.dvh-stage{display:flex;justify-content:center}
.phone{width:300px;background:var(--color-background-primary);border:1px solid var(--color-border-secondary);border-radius:26px;overflow:hidden}
.sbar{height:26px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:11px;color:var(--color-text-tertiary)}
.screen{display:none}.screen.show{display:block}
.scr-h{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--color-text-tertiary);text-align:center;margin:14px 0 6px}
.ph{background:repeating-linear-gradient(45deg,#efeee8,#efeee8 8px,#e7e6df 8px,#e7e6df 16px);
  border:.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-md);display:flex;align-items:center;justify-content:center;color:var(--color-text-tertiary);font-size:12px}
.map{height:300px;position:relative;background:#E7E4D2;border-bottom:.5px solid var(--color-border-tertiary);overflow:hidden;cursor:pointer}
.photo{display:block;object-fit:cover}
.region{position:absolute;left:18px;top:40px;width:150px;height:120px;background:rgba(29,158,117,.16);border:1px dashed var(--teal);border-radius:18px 40px 24px 30px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--teal-tx);text-align:center;cursor:pointer}
.pin{position:absolute;width:24px;height:24px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:1px solid #fff;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.25)}
.pin i{transform:rotate(45deg);display:block;color:#fff;font-size:12px;text-align:center;line-height:22px}
.pin.eat{background:#C2762E}.pin.wash{background:#4F7A86}.pin.shop{background:#8A6BA0}.pin.me{background:#2C2A1E;border-radius:50%}
.pin.unv{background:#fff;border:1.5px dashed #C2762E;box-shadow:none}.pin.unv i{color:#C2762E}
.searchbar{display:flex;align-items:center;gap:8px;margin:10px 12px;padding:8px 10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);font-size:13px;color:var(--color-text-tertiary)}
.searchbar .filt{margin-left:auto;color:var(--color-text-secondary);cursor:pointer}
.chips{display:flex;gap:6px;overflow:hidden;padding:0 12px 10px}
.chip{font-size:11px;padding:5px 9px;border:.5px solid var(--color-border-secondary);border-radius:20px;white-space:nowrap;color:var(--color-text-secondary)}
.chip.on{background:var(--teal-bg);color:var(--teal-tx);border-color:var(--teal)}
.tabbar{display:flex;border-top:.5px solid var(--color-border-tertiary)}
.tabbar div{flex:1;text-align:center;padding:8px 0 10px;font-size:10px;color:var(--color-text-tertiary);cursor:pointer}
.tabbar div i{display:block;font-size:18px;margin-bottom:2px}.tabbar div.on{color:var(--teal-tx)}
.fab{position:absolute;right:12px;bottom:12px;width:34px;height:34px;border-radius:50%;background:#fff;border:.5px solid var(--color-border-secondary);display:flex;align-items:center;justify-content:center;color:var(--color-text-secondary)}
.legend{position:absolute;left:8px;top:8px;background:rgba(255,255,255,.92);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:5px 8px;font-size:10px;color:var(--color-text-secondary);line-height:1.5}
.peek{position:absolute;left:8px;right:8px;bottom:8px;background:#fff;border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:10px;display:flex;gap:10px;align-items:center;cursor:pointer}
.peek .thumb{width:40px;height:40px;border-radius:8px;flex:none}
.topbar{display:flex;align-items:center;gap:10px;padding:10px 12px;font-size:14px}
.topbar .ic{cursor:pointer;color:var(--color-text-secondary)}.topbar .sp{margin-left:auto;display:flex;gap:12px}
.hero{height:150px;border-radius:0}
.title{font-size:17px;font-weight:500;margin:10px 12px 2px}
.meta{font-size:12px;color:var(--color-text-tertiary);margin:0 12px 10px}
.tag{display:inline-block;font-size:11px;background:var(--color-background-secondary);color:var(--color-text-secondary);padding:2px 8px;border-radius:20px;margin:0 2px 0 0}
.tag.cat{background:var(--teal-bg);color:var(--teal-tx)}
.vbadge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;border-radius:20px}
.vbadge.unv{background:#faeeda;color:#854f0b}.vbadge.ver{background:#e1f5ee;color:#0f6e56}
.vbox{margin:0 12px 12px;padding:11px;border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);background:var(--color-background-secondary)}
.vbox .vh{font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px}
.vbox .vs{font-size:12px;color:var(--color-text-secondary);margin-top:4px}
.vbar{height:6px;background:rgba(0,0,0,.08);border-radius:4px;overflow:hidden;margin:8px 0 6px}
.vbar i{display:block;height:100%;background:var(--teal)}
.vcount{font-size:11px;color:var(--color-text-tertiary)}
.vask{font-size:13px;margin:10px 0 0;font-weight:500}
.vbtns{display:flex;gap:8px;margin-top:8px}.vbtns .btn{flex:1}
.elig{font-size:11px;color:var(--color-text-tertiary);margin-top:8px;display:flex;align-items:center;gap:6px}
.actions{display:flex;gap:8px;padding:0 12px 12px}.actions .btn{flex:1}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;padding:9px 10px;border-radius:var(--border-radius-md);border:.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;text-align:center}
.btn.pri{background:var(--teal);color:#fff;border-color:var(--teal)}.btn.dng{color:#a32d2d;border-color:#e0a0a0}
.btn.wide{width:calc(100% - 24px);margin:4px 12px}
.sec{padding:12px;border-top:.5px solid var(--color-border-tertiary)}
.sec h4{font-size:12px;text-transform:uppercase;letter-spacing:.03em;color:var(--color-text-tertiary);margin:0 0 8px;font-weight:500}
.sec p{font-size:13px;color:var(--color-text-secondary);margin:0;line-height:1.5}
.amen{display:flex;flex-wrap:wrap;gap:8px}
.amen span{font-size:12px;color:var(--color-text-secondary);background:var(--color-background-secondary);padding:5px 9px;border-radius:var(--border-radius-md)}
.amen span.hl{background:var(--teal-bg);color:var(--teal-tx)}
.gallery{display:flex;gap:6px;padding:0 12px 12px}.gallery .ph{height:64px;flex:1}
.field{margin:0 12px 12px}
.field label{font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:4px}
.input{height:34px;border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);display:flex;align-items:center;padding:0 10px;font-size:13px;color:var(--color-text-tertiary);background:#fff}
.input.area{height:auto;padding:8px 10px;min-height:54px;align-items:flex-start}.input .chev{margin-left:auto}
.check{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--color-text-secondary);padding:4px 0}.check i{color:var(--teal)}
.choice{margin:0 12px 10px;border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:12px;cursor:pointer}
.choice:hover{border-color:var(--teal);background:var(--teal-bg)}
.choice .ct{font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px}.choice .cd{font-size:12px;color:var(--color-text-secondary);margin-top:4px}
.center{text-align:center;padding:28px 16px}
.center .big{width:54px;height:54px;border-radius:50%;background:var(--teal-bg);color:var(--teal-tx);display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px}
.center h3{font-size:16px;margin:0 0 6px;font-weight:500}.center p{font-size:13px;color:var(--color-text-secondary);margin:0 0 18px;line-height:1.5}
.qrow{padding:11px 12px;border-bottom:.5px solid var(--color-border-tertiary);cursor:pointer}
.qrow .l1{font-size:13px;display:flex;align-items:center;gap:6px}.qrow .l2{font-size:11px;color:var(--color-text-tertiary);margin-top:2px}
.qrow .qa{display:flex;gap:6px;margin-top:8px}.qrow .qa .btn{flex:1;padding:6px}
.status{font-size:11px;padding:2px 8px;border-radius:20px;white-space:nowrap}
.st-pub{background:#e1f5ee;color:#0f6e56}.st-pen{background:#faeeda;color:#854f0b}.st-rej{background:#fcebeb;color:#a32d2d}
.st-con{background:#faeeda;color:#854f0b}.st-plan{background:#e6f1fb;color:#0c447c}.st-done{background:#eaf3de;color:#3b6d11}
.note{margin:10px 12px;padding:9px 10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);font-size:12px;color:var(--color-text-secondary);display:flex;gap:8px}
.note i{color:var(--color-text-tertiary);margin-top:1px}
.warn{margin:0;border-radius:0;background:#faeeda;color:#854f0b}
.profile-h{padding:16px 12px;display:flex;align-items:center;gap:12px;border-bottom:.5px solid var(--color-border-tertiary)}
.avatar{width:44px;height:44px;border-radius:50%;background:var(--teal-bg);color:var(--teal-tx);display:flex;align-items:center;justify-content:center;font-weight:500}
.seg{display:flex;margin:10px 12px;border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);overflow:hidden}
.seg div{flex:1;text-align:center;font-size:12px;padding:7px 0;color:var(--color-text-secondary)}.seg div.on{background:var(--teal-bg);color:var(--teal-tx)}
.modentry{margin:12px;padding:11px 12px;border:.5px solid #e0a0a0;background:#fcebeb;border-radius:var(--border-radius-md);font-size:13px;color:#a32d2d;display:flex;align-items:center;gap:8px;cursor:pointer}
.modentry .ct{margin-left:auto;background:#fff;border-radius:20px;padding:1px 8px;font-size:11px}
.upv{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:40px;padding:5px 4px;border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:12px;color:var(--color-text-secondary);cursor:pointer}
.upv i{font-size:14px}.upv.on{background:var(--teal-bg);color:var(--teal-tx);border-color:var(--teal)}
.frrow{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border-bottom:.5px solid var(--color-border-tertiary)}
.frrow .frt{font-size:13px;font-weight:500}.frrow .frd{font-size:11px;color:var(--color-text-tertiary);margin-top:3px;display:flex;align-items:center;gap:6px}
.acfield{margin-top:8px;height:34px;border:.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-md);display:flex;align-items:center;gap:6px;padding:0 10px;font-size:13px;color:var(--color-text-tertiary)}
.acsug{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}.acsug span{font-size:11px;border:.5px solid var(--color-border-tertiary);border-radius:20px;padding:3px 8px;color:var(--color-text-secondary);cursor:pointer}
.acsug span.new{border-style:dashed;color:var(--teal-tx)}
.stars{color:#e6a817;letter-spacing:1px}.stars .off{color:rgba(0,0,0,.16)}
.rev{display:flex;gap:10px;padding:9px 0;border-top:.5px solid var(--color-border-tertiary)}
.ravatar{width:30px;height:30px;border-radius:50%;background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--color-text-secondary);flex:none}
.rev .rn{font-size:12px;font-weight:500}.rev .rt{font-size:12px;color:var(--color-text-secondary);margin:2px 0;line-height:1.45}.rev .rd{font-size:11px;color:var(--color-text-tertiary)}
.ratebig{text-align:center;padding:16px 12px 8px}.ratebig .num{font-size:30px;letter-spacing:6px;cursor:pointer}
.bio{font-size:12px;color:var(--color-text-secondary);padding:0 12px 10px;line-height:1.5}
.subh{padding:0 12px 6px;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--color-text-tertiary)}
.dogs{display:flex;gap:8px;padding:0 12px 12px;flex-wrap:wrap}
.dog{display:flex;align-items:center;gap:7px;border:.5px solid var(--color-border-tertiary);border-radius:20px;padding:4px 11px 4px 5px;font-size:12px;color:var(--color-text-secondary);cursor:pointer}
.dog .dav{width:24px;height:24px;border-radius:50%;background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;font-size:12px;flex:none;color:var(--color-text-secondary)}
.dogcard{display:flex;gap:10px;align-items:center;margin-bottom:8px;padding:10px;border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg)}
.dogcard .dav{width:42px;height:42px;border-radius:50%;background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;flex:none;color:var(--color-text-secondary);font-size:18px}
.avedit{position:relative;width:72px;height:72px;margin:10px auto 4px}
.avedit .big{width:72px;height:72px;border-radius:50%;background:var(--teal-bg);color:var(--teal-tx);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:500}
.avedit .cam{position:absolute;right:-2px;bottom:-2px;width:26px;height:26px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;border:2px solid var(--color-background-primary);font-size:13px}
.caption{text-align:center;font-size:12px;color:#6b6a64;margin-top:14px}`;

const ORDER=["discovery","filter","detail_region","detail_poi","review_new","submit_type","submit_place_poi","submit_place_region","submit_form","submit_pending","profile","profile_edit","dog_edit","feature_requests","feature_new","mod_queue","mod_review"];
const TABS=[["map","Map","ti-map"],["nearby","Nabij","ti-list"],["add","Add","ti-plus"],["profile","Profiel","ti-user"]];
let current="discovery";
function tabbar(active){return '<div class="tabbar">'+TABS.map(t=>`<div class="${t[0]===active?'on':''}" onclick="go('${t[0]==='add'?'submit_type':t[0]==='profile'?'profile':'discovery'}')"><i class="ti ${t[2]}"></i>${t[1]}</div>`).join('')+'</div>';}
function render(){
  const nav='<div class="dvh-nav">'+ORDER.map(id=>`<button class="${id===current?'on':''}" onclick="go('${id}')">${SCREENS[id].label}</button>`).join('')+'</div>';
  const s=SCREENS[current];
  const phone=`<div class="dvh-stage"><div class="phone">
    <div class="sbar"><span>9:41</span><span><i class="ti ti-wifi"></i> <i class="ti ti-battery-3"></i></span></div>
    <div class="scr-h">${s.label}</div><div class="screen show">${s.html}</div>${tabbar(s.tab)}
  </div></div>`;
  document.getElementById('dvh-root').innerHTML='<style>'+ROOT_STYLE+'</style>'+nav+phone+'<div class="caption">Klikbaar low-fi prototype · tik op pins, knoppen en de tabbalk om door de flows te lopen</div>';
}
function go(id){if(SCREENS[id]){current=id;render();window.scrollTo({top:0,behavior:'smooth'});}}
render();
</script>
