<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>De Vrije Hond — hi-fi prototype</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Inter:wght@400;500&display=swap');
:root{--moss:#6E7B33;--mossd:#4C5622;--mosss:#E7E9D5;--terra:#C2762E;--terrad:#8A4F1B;--terras:#F3E3D0;--sand:#F3EFE3;--ink:#2C2A1E;--ink2:#5E5A48;--ink3:#9a957f;--rust:#A33B2D;--line:rgba(60,50,20,.12)}
*{box-sizing:border-box;font-family:'Inter',-apple-system,sans-serif}
body{margin:0;background:#E4DEC9;color:var(--ink);padding:22px 12px;display:flex;justify-content:center}
.wrap{width:100%;max-width:680px}
.wm{font-family:Poppins;font-weight:600;color:var(--moss);font-size:15px;display:flex;align-items:center;gap:6px;justify-content:center;margin-bottom:12px}
.nav{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:16px}
.nav button{font-size:12px;padding:5px 10px;border:none;background:#fff;border-radius:9px;color:var(--ink2);cursor:pointer;box-shadow:0 1px 4px rgba(44,42,30,.08)}
.nav button.on{background:var(--moss);color:#fff}
.stage{display:flex;justify-content:center}
.phone{width:300px;background:#fff;border-radius:30px;overflow:hidden;box-shadow:0 10px 32px rgba(44,42,30,.18);position:relative}
.sbar{height:24px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;font-size:11px;color:var(--ink);font-weight:500;position:relative;z-index:6}
.sbar.ov{color:#fff;margin-bottom:-24px}
.title{font-family:Poppins}
h2,h3,h4{font-family:Poppins;font-weight:600}
.photo,.bg{object-fit:cover;display:block}
.bg{position:absolute;inset:0;width:100%;height:100%}
.scrim{position:absolute;left:0;right:0;bottom:0;height:62%;background:linear-gradient(to top,rgba(30,28,18,.82),rgba(30,28,18,0))}
/* generic */
.btn{display:flex;align-items:center;justify-content:center;gap:7px;font-size:13px;font-weight:500;padding:11px;border-radius:12px;cursor:pointer}
.btn.pri{background:var(--moss);color:#fff;box-shadow:0 4px 12px rgba(110,123,51,.3)}
.btn.gho{border:1px solid rgba(60,50,20,.2);color:var(--ink);background:#fff}
.btn.dng{border:1px solid #d8b0a8;color:var(--rust);background:#fff}
.btn.wide{margin:4px 16px}
.tabbar{display:flex;border-top:1px solid var(--line);background:#fff}
.tabbar div{flex:1;text-align:center;padding:7px 0 9px;font-size:10px;color:var(--ink3);cursor:pointer}
.tabbar div i{display:block;font-size:19px;margin-bottom:2px}
.tabbar div.on{color:var(--mossd)}
.topbar{display:flex;align-items:center;gap:10px;padding:12px 14px;font-size:15px}
.topbar .ic{cursor:pointer;color:var(--ink2)}
.topbar .ttl{font-family:Poppins;font-weight:600;font-size:15px}
.topbar .sp{margin-left:auto;display:flex;gap:14px}
.topbar .save{margin-left:auto;color:var(--mossd);font-weight:500;font-size:13px;cursor:pointer}
.sec{padding:14px 16px;border-top:1px solid var(--line)}
.sec h4{font-size:13px;color:var(--ink);margin:0 0 11px}
.sec p{font-size:13px;color:var(--ink2);margin:0;line-height:1.55}
.field{margin:0 16px 13px}
.field label{font-size:12px;color:var(--ink2);display:block;margin-bottom:5px;font-weight:500}
.input{min-height:42px;border:1px solid rgba(60,50,20,.18);border-radius:12px;display:flex;align-items:center;padding:0 12px;font-size:13px;color:var(--ink3);background:#fff}
.input.area{align-items:flex-start;padding:11px 12px;min-height:60px}
.input .chev{margin-left:auto;color:var(--ink3)}
.chev{margin-left:auto;color:var(--ink3)}
.note{margin:12px 16px;padding:11px 12px;background:var(--sand);border-radius:12px;font-size:12px;color:var(--ink2);display:flex;gap:9px;line-height:1.5}
.note i{color:var(--mossd);margin-top:1px}
/* map */
.map{height:430px;position:relative;background:#E7E4D2;overflow:hidden}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(110,123,51,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(110,123,51,.05) 1px,transparent 1px);background-size:34px 34px}
.road{position:absolute;background:#EFEBDC}
.water{position:absolute;background:#cfe0dc;border-radius:40% 50% 45% 55%}
.reg{position:absolute;background:rgba(110,123,51,.20);border:1.5px solid var(--moss);border-radius:30% 50% 40% 45%;cursor:pointer}
.reg .lab{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:10px;color:var(--mossd);font-weight:500;white-space:nowrap}
.mk{position:absolute;width:34px;height:34px;transform:translate(-50%,-100%);filter:drop-shadow(0 3px 4px rgba(0,0,0,.3));cursor:pointer}
.mk .tear{width:34px;height:34px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:var(--moss);display:flex;align-items:center;justify-content:center;border:2px solid #fff}
.mk .tear i{transform:rotate(45deg);color:#fff;font-size:15px}
.mk.eat .tear{background:var(--terra)}.mk.wash .tear{background:#4F7A86}.mk.shop .tear{background:#8A6BA0}
.mk.unv .tear{background:#fff;border:2px dashed var(--terra)}.mk.unv .tear i{color:var(--terra)}
.me{position:absolute;width:16px;height:16px;border-radius:50%;background:#3F6FB0;border:3px solid #fff;transform:translate(-50%,-50%);box-shadow:0 0 0 6px rgba(63,111,176,.18)}
.topfloat{position:absolute;left:12px;right:12px;top:30px;z-index:4}
.searchpill{display:flex;align-items:center;gap:9px;background:#fff;border-radius:26px;padding:10px 12px;box-shadow:0 4px 14px rgba(44,42,30,.14);font-size:12px;color:var(--ink3)}
.searchpill .av{width:26px;height:26px;border-radius:50%;background:var(--mosss);color:var(--mossd);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;margin-left:auto;font-family:Poppins;cursor:pointer}
.catscroll{display:flex;gap:7px;margin-top:9px;overflow:hidden}
.catpill{background:#fff;border-radius:20px;padding:6px 11px;font-size:11px;color:var(--ink2);box-shadow:0 2px 8px rgba(44,42,30,.1);white-space:nowrap;display:flex;align-items:center;gap:5px;cursor:pointer}
.catpill.on{background:var(--moss);color:#fff}
.locbtn{position:absolute;right:14px;bottom:150px;width:40px;height:40px;border-radius:50%;background:#fff;box-shadow:0 4px 12px rgba(44,42,30,.18);display:flex;align-items:center;justify-content:center;color:var(--mossd);z-index:4}
.sheet{position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:22px 22px 0 0;box-shadow:0 -6px 24px rgba(44,42,30,.14);padding:8px 14px 14px;z-index:4}
.handle{width:38px;height:4px;border-radius:3px;background:rgba(60,50,20,.18);margin:2px auto 11px}
.sheet h3{font-size:14px;color:var(--ink);margin:0 0 10px;display:flex;align-items:center}
.sheet h3 span{margin-left:auto;font-size:11px;font-weight:500;color:var(--ink3);font-family:Inter}
.scard{display:flex;gap:11px;align-items:center;cursor:pointer}
.scard .th{width:58px;height:58px;border-radius:13px;flex:none;overflow:hidden;position:relative}
.scard .ti2{font-size:14px;font-weight:600;color:var(--ink);font-family:Poppins;display:flex;align-items:center;gap:6px}
.miniver{width:15px;height:15px;border-radius:50%;background:var(--moss);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:9px}
.miniunv{width:15px;height:15px;border-radius:50%;background:var(--terra);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:9px}
.scard .sub{font-size:11px;color:var(--ink2);margin-top:3px}
.scard .am{font-size:10px;color:var(--mossd);background:var(--mosss);padding:2px 7px;border-radius:7px;margin-top:6px;display:inline-block}
.stars{color:var(--terra);letter-spacing:1px}
/* detail */
.hero{height:226px;position:relative}
.gbadge{position:absolute;left:12px;bottom:12px;background:rgba(44,42,30,.7);color:#fff;font-size:10px;padding:2px 8px;border-radius:20px;z-index:3}
.htop{position:absolute;left:12px;right:12px;top:30px;display:flex;z-index:3}
.cbtn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;color:var(--ink);box-shadow:0 2px 8px rgba(0,0,0,.18);cursor:pointer}
.cbtn+.cbtn{margin-left:8px}
.htop .sp{margin-left:auto;display:flex}
.hlab{position:absolute;left:16px;right:16px;bottom:14px;z-index:3}
.pills{display:flex;gap:6px;margin-bottom:7px}
.pill-cat{font-size:11px;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,.9);color:var(--mossd);font-weight:500}
.pill-unv{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--terra);color:#fff;font-weight:500;display:inline-flex;align-items:center;gap:4px}
.pill-ver{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--moss);color:#fff;font-weight:500;display:inline-flex;align-items:center;gap:4px}
.hlab h2{font-size:22px;color:#fff;margin:0;text-shadow:0 1px 6px rgba(0,0,0,.4)}
.dmeta{display:flex;align-items:center;gap:8px;padding:13px 16px 0;font-size:12px;color:var(--ink2);flex-wrap:wrap}
.ratepill{display:inline-flex;align-items:center;gap:4px;background:var(--mosss);color:var(--mossd);padding:3px 9px;border-radius:20px;font-weight:500}
.dot{width:3px;height:3px;border-radius:50%;background:var(--ink3)}
.open{color:var(--moss);font-weight:500}
.dact{display:flex;gap:9px;padding:13px 16px}
.dact .pri{flex:1}
.dact .ic{width:46px;border-radius:12px;border:1px solid rgba(60,50,20,.18);display:flex;align-items:center;justify-content:center;color:var(--ink2);cursor:pointer}
.cverify{margin:4px 16px 14px;background:var(--sand);border:1px solid var(--line);border-radius:16px;padding:13px}
.cverify .row{display:flex;align-items:center;gap:11px}
.ring{width:44px;height:44px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center}
.ring .in{width:34px;height:34px;border-radius:50%;background:var(--sand);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--mossd);font-family:Poppins}
.cverify .t{font-size:13px;font-weight:600;color:var(--ink);font-family:Poppins}
.cverify .s{font-size:11px;color:var(--ink2);margin-top:2px}
.vbtns{display:flex;gap:8px;margin-top:11px}
.vbtns div{flex:1;padding:9px;border-radius:11px;font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:5px;cursor:pointer}
.vyes{background:var(--moss);color:#fff}.vno{border:1px solid rgba(60,50,20,.2);color:var(--terrad)}
.elig{font-size:11px;color:var(--ink3);margin-top:9px;display:flex;align-items:center;gap:6px}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:11px 10px}
.agrid .a{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--ink)}
.agrid .a .ci{width:30px;height:30px;border-radius:9px;background:var(--mosss);color:var(--mossd);display:flex;align-items:center;justify-content:center;font-size:15px;flex:none}
.agrid .a.hl .ci{background:var(--moss);color:#fff}
.inforow{display:flex;align-items:center;gap:11px;font-size:13px;color:var(--ink);padding:3px 0}
.inforow .ci{width:30px;height:30px;border-radius:9px;background:var(--mosss);color:var(--mossd);display:flex;align-items:center;justify-content:center;font-size:15px;flex:none}
.inforow small{color:var(--ink3);font-size:11px}
.galv{display:flex;gap:7px;padding:0 16px 14px}
.galv img{height:74px;flex:1;border-radius:12px}
.rsum{display:flex;gap:14px;align-items:center;margin-bottom:12px}
.rsum .big{font-size:30px;font-weight:600;font-family:Poppins;color:var(--ink);line-height:1}
.rbars{flex:1}
.rbar{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.rbar span{font-size:9px;color:var(--ink3);width:8px}
.rbar .tk{flex:1;height:4px;border-radius:2px;background:rgba(60,50,20,.1);overflow:hidden}
.rbar .tk i{display:block;height:100%;background:var(--terra)}
.rcard{display:flex;gap:10px;padding:11px 0;border-top:1px solid var(--line)}
.rav{width:32px;height:32px;border-radius:50%;flex:none;overflow:hidden;background:var(--mosss);display:flex;align-items:center;justify-content:center;color:var(--mossd);font-size:11px;font-weight:600;font-family:Poppins}
.rcard .rn{font-size:12px;font-weight:600;color:var(--ink)}
.rcard .rt{font-size:12px;color:var(--ink2);margin:3px 0;line-height:1.45}
.rcard .rd{font-size:11px;color:var(--ink3)}
.foot{padding:12px 16px 16px;font-size:11px;color:var(--ink3);display:flex;align-items:center;gap:8px}
.foot .fav{width:22px;height:22px;border-radius:50%;background:var(--mosss);color:var(--mossd);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600}
.minimap{height:150px;position:relative;background:#E7E4D2;overflow:hidden}
.minimap .grid-bg{opacity:1}
/* chips / amenity pick / segmented */
.chipset{display:flex;gap:7px;flex-wrap:wrap}
.ap{display:flex;align-items:center;gap:7px;border:1px solid rgba(60,50,20,.18);border-radius:12px;padding:8px 11px;font-size:12px;color:var(--ink2);cursor:pointer}
.ap i{font-size:15px;color:var(--ink3)}
.ap.on{background:var(--mosss);border-color:var(--moss);color:var(--mossd)}
.ap.on i{color:var(--mossd)}
.acfield{margin-top:9px;min-height:40px;border:1px dashed rgba(60,50,20,.3);border-radius:12px;display:flex;align-items:center;gap:7px;padding:0 12px;font-size:13px;color:var(--ink3)}
.acsug{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
.acsug span{font-size:11px;border:1px solid var(--line);border-radius:20px;padding:4px 9px;color:var(--ink2);cursor:pointer}
.acsug span.new{border-style:dashed;color:var(--mossd)}
.seg{display:flex;margin:12px 16px;background:var(--sand);border-radius:12px;padding:3px}
.seg div{flex:1;text-align:center;font-size:12px;padding:7px 0;color:var(--ink2);border-radius:9px;cursor:pointer}
.seg div.on{background:#fff;color:var(--mossd);font-weight:500;box-shadow:0 1px 4px rgba(44,42,30,.1)}
.choicecard{margin:0 16px 12px;border:1px solid rgba(60,50,20,.16);border-radius:16px;padding:15px;cursor:pointer;display:flex;gap:13px;align-items:flex-start}
.choicecard:hover{border-color:var(--moss);background:var(--mosss)}
.choicecard .ico{width:42px;height:42px;border-radius:12px;background:var(--mosss);color:var(--mossd);display:flex;align-items:center;justify-content:center;font-size:21px;flex:none}
.choicecard .ct{font-size:15px;font-weight:600;color:var(--ink);font-family:Poppins}
.choicecard .cd{font-size:12px;color:var(--ink2);margin-top:4px;line-height:1.45}
.photorow{display:flex;gap:8px}
.photorow .add{width:60px;height:60px;border-radius:12px;border:1px dashed rgba(60,50,20,.3);display:flex;align-items:center;justify-content:center;color:var(--ink3);font-size:20px}
.photorow img{width:60px;height:60px;border-radius:12px}
/* success */
.center{text-align:center;padding:30px 20px}
.center .big{width:60px;height:60px;border-radius:50%;background:var(--moss);color:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px;box-shadow:0 6px 16px rgba(110,123,51,.3)}
.center h3{font-size:17px;margin:0 0 8px;color:var(--ink)}
.center p{font-size:13px;color:var(--ink2);margin:0 0 20px;line-height:1.55}
/* profile */
.phead{padding:16px;display:flex;align-items:center;gap:12px}
.pav{width:54px;height:54px;border-radius:50%;background:var(--mosss);color:var(--mossd);display:flex;align-items:center;justify-content:center;font-weight:600;font-family:Poppins;font-size:18px;position:relative;cursor:pointer;flex:none}
.pav .cam{position:absolute;right:-2px;bottom:-2px;width:22px;height:22px;border-radius:50%;background:var(--moss);color:#fff;display:flex;align-items:center;justify-content:center;border:2px solid #fff;font-size:11px}
.pname{font-family:Poppins;font-weight:600;font-size:16px;color:var(--ink)}
.phandle{font-size:12px;color:var(--ink3)}
.pmeta{font-size:12px;color:var(--ink2);margin-top:3px}
.bio{font-size:12px;color:var(--ink2);padding:0 16px 12px;line-height:1.55}
.subh{padding:0 16px 7px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink3);font-weight:500}
.dogs{display:flex;gap:8px;padding:0 16px 14px;flex-wrap:wrap}
.dog{display:flex;align-items:center;gap:7px;border:1px solid rgba(60,50,20,.16);border-radius:22px;padding:4px 12px 4px 4px;font-size:12px;color:var(--ink2);cursor:pointer}
.dog .dav{width:26px;height:26px;border-radius:50%;flex:none;overflow:hidden;background:var(--mosss);color:var(--mossd);display:flex;align-items:center;justify-content:center;font-size:12px}
.dogcard{display:flex;gap:11px;align-items:center;margin:0 16px 9px;padding:11px;border:1px solid var(--line);border-radius:14px}
.dogcard .dav{width:44px;height:44px;border-radius:50%;flex:none;overflow:hidden;background:var(--mosss);color:var(--mossd);display:flex;align-items:center;justify-content:center;font-size:20px}
.avedit{position:relative;width:80px;height:80px;margin:14px auto 6px}
.avedit .big2{width:80px;height:80px;border-radius:50%;background:var(--mosss);color:var(--mossd);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:600;font-family:Poppins;overflow:hidden}
.avedit .cam{position:absolute;right:0;bottom:0;width:28px;height:28px;border-radius:50%;background:var(--moss);color:#fff;display:flex;align-items:center;justify-content:center;border:3px solid #fff;font-size:13px}
.avlabel{text-align:center;font-size:12px;color:var(--mossd);font-weight:500;margin-bottom:14px;cursor:pointer}
.lrow{display:flex;align-items:center;gap:10px;padding:12px 16px;border-top:1px solid var(--line);font-size:13px;color:var(--ink);cursor:pointer}
.lrow .lic{color:var(--ink2);font-size:18px}
.lrow .l2{font-size:11px;color:var(--ink3);margin-top:2px}
.lrow .chev{color:var(--ink3)}
.badge{font-size:10px;padding:3px 9px;border-radius:20px;white-space:nowrap;font-weight:500}
.b-ver{background:var(--mosss);color:var(--mossd)}.b-unv{background:var(--terras);color:var(--terrad)}.b-hid{background:#F3DAD5;color:var(--rust)}
.b-plan{background:#E2EAF2;color:#2C4A66}.b-con{background:var(--terras);color:var(--terrad)}.b-done{background:#E7E9D5;color:var(--mossd)}
.menu-entry{margin:14px 16px 0;padding:12px;border:1px solid #d8b0a8;background:#F7E9E5;border-radius:13px;font-size:13px;color:var(--rust);display:flex;align-items:center;gap:9px;cursor:pointer}
.menu-entry .ct2{margin-left:auto;background:#fff;border-radius:20px;padding:1px 9px;font-size:11px;font-weight:600}
/* feature requests */
.frrow{display:flex;gap:11px;align-items:flex-start;padding:13px 16px;border-top:1px solid var(--line)}
.upv{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:44px;padding:6px 4px;border:1px solid rgba(60,50,20,.18);border-radius:12px;font-size:13px;font-weight:600;color:var(--ink2);cursor:pointer;font-family:Poppins}
.upv i{font-size:15px}
.upv.on{background:var(--mosss);color:var(--mossd);border-color:var(--moss)}
.frt{font-size:13px;font-weight:600;color:var(--ink)}
.frd{font-size:11px;color:var(--ink3);margin-top:4px;display:flex;align-items:center;gap:6px}
/* admin */
.qcard{margin:12px 16px;border:1px solid var(--line);border-radius:14px;overflow:hidden}
.qcard .qh{display:flex;align-items:center;gap:9px;padding:11px 12px}
.qcard .qh .qic{width:32px;height:32px;border-radius:9px;background:var(--mosss);color:var(--mossd);display:flex;align-items:center;justify-content:center;flex:none}
.qcard .qt{font-size:13px;font-weight:600;color:var(--ink)}
.qcard .qm{font-size:11px;color:var(--ink3);margin-top:2px}
.qact{display:flex;gap:7px;padding:0 12px 12px}
.qact div{flex:1;padding:7px;border-radius:10px;font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:5px;cursor:pointer}

const ORDER=["discovery","filter","detail_poi","detail_region","review_new","submit_type","submit_place_poi","submit_place_region","submit_form","submit_pending","profile","profile_edit","dog_edit","feature_requests","feature_new","mod_queue","mod_review"];
const TABS=[["map","Map","ti-map"],["nearby","Nabij","ti-list-details"],["add","Add","ti-plus"],["profile","Profiel","ti-user"]];
let current="discovery";
function tabbar(active){return '<div class="tabbar">'+TABS.map(t=>`<div class="${t[0]===active?'on':''}" onclick="go('${t[0]==='add'?'submit_type':t[0]==='profile'?'profile':'discovery'}')"><i class="ti ${t[2]}"></i>${t[1]}</div>`).join('')+'</div>';}
function render(){
  const nav='<div class="nav">'+ORDER.map(id=>`<button class="${id===current?'on':''}" onclick="go('${id}')">${SCREENS[id].label}</button>`).join('')+'</div>';
  const s=SCREENS[current];
  const phone=`<div class="stage"><div class="phone">
    <div class="sbar ${s.overlay?'ov':''}"><span>9:41</span><span><i class="ti ti-wifi"></i> <i class="ti ti-battery-3"></i></span></div>
    ${s.html}${tabbar(s.tab)}</div></div>`;
  document.getElementById('root').innerHTML='<div class="wm"><i class="ti ti-paw"></i> De Vrije Hond · hi-fi prototype</div>'+nav+phone+'<div class="cap">Klikbaar · tik op pins, kaarten, knoppen en de tabbalk. Echte stockfoto\\'s via place.dog (picsum als fallback).</div>';
}
function go(id){if(SCREENS[id]){current=id;render();window.scrollTo({top:0,behavior:'smooth'});}}
render();
</script>
</body>
</html>
