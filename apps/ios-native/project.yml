name: DeVrijeHondNative
options:
  bundleIdPrefix: nl.devrijehond
  deploymentTarget:
    iOS: '17.0'
  createIntermediateGroups: true
packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.1.0
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.40.0
settings:
  base:
    SWIFT_VERSION: '5.0'
    MARKETING_VERSION: '1.1.0'
    CURRENT_PROJECT_VERSION: '39'
    DEVELOPMENT_TEAM: ND82KXRD2Q
targets:
  DeVrijeHondNative:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: Sentry
        product: Sentry
    info:
      path: Info.plist
      properties:
        # xcodegen's generated plist hardcodes 1.0/1 otherwise, ignoring the
        # MARKETING_VERSION/CURRENT_PROJECT_VERSION settings — reference them so the
        # build number actually tracks the setting.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UIUserInterfaceStyle: Light
        ITSAppUsesNonExemptEncryption: false
        NSLocationWhenInUseUsageDescription: 'Je locatie laat de kaart zien welke hondenplekken bij jou in de buurt zijn, en bepaalt of je een plek kunt bevestigen.'
        GIDClientID: '762592672284-8atreoupa0ic702gnrg61bds9h88qrmp.apps.googleusercontent.com'
        GIDServerClientID: '762592672284-cr47iv5jq6d0p2ghvmrcrf1lar90vpiq.apps.googleusercontent.com'
        CFBundleURLTypes:
          - CFBundleURLName: nl.devrijehond.app
            CFBundleURLSchemes: [vrijehond]
          - CFBundleURLName: google-signin
            CFBundleURLSchemes:
              [com.googleusercontent.apps.762592672284-8atreoupa0ic702gnrg61bds9h88qrmp]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: nl.devrijehond.app
        TARGETED_DEVICE_FAMILY: '1'
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: DeVrijeHondNative.entitlements
        # Sign the APP TARGET ONLY here (not on the xcodebuild command line) so the
        # SPM package targets — AppAuth/GoogleSignIn/etc, which reject provisioning
        # profiles — don't inherit it. The profile name is fastlane sigh's default
        # ("<bundle id> AppStore"); the release script asserts it matches.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: Apple Distribution
        PROVISIONING_PROFILE_SPECIFIER: nl.devrijehond.app AppStore
