name: DeVrijeHondNative
options:
  bundleIdPrefix: nl.devrijehond
  deploymentTarget:
    iOS: '17.0'
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: '5.0'
    MARKETING_VERSION: '0.1.0'
    CURRENT_PROJECT_VERSION: '30'
    DEVELOPMENT_TEAM: ND82KXRD2Q
targets:
  DeVrijeHondNative:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: nl.devrijehond.app
        TARGETED_DEVICE_FAMILY: '1'
        GENERATE_INFOPLIST_FILE: 'YES'
        INFOPLIST_KEY_UILaunchScreen_Generation: 'YES'
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: 'YES'
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: 'Je locatie laat de kaart zien welke hondenplekken bij jou in de buurt zijn, en bepaalt of je een plek kunt bevestigen.'
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: 'NO'
        CODE_SIGN_STYLE: Manual
