name: iOS build

# Builds the iOS app on a GitHub macOS runner (no EAS).
# - `compile`  : no-signing build that validates the native project + pods + JS
#                bundle. Always runs on dispatch.
# - `testflight`: signed archive + upload to TestFlight. Enable by setting the
#                 repo variable IOS_RELEASE=true and the Apple secrets (see
#                 docs/CI.md). Uses App Store Connect API-key signing.
on:
  workflow_dispatch:

jobs:
  compile:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prebuild native project
        working-directory: apps/mobile
        run: pnpm exec expo prebuild -p ios --no-install
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'https://www.devrijehond.nl' }}
          EXPO_PUBLIC_AUTH_URL: ${{ vars.EXPO_PUBLIC_AUTH_URL || 'https://www.devrijehond.nl' }}
      - name: Install pods
        working-directory: apps/mobile/ios
        run: pod install
      - name: Build (no code signing)
        working-directory: apps/mobile/ios
        run: |
          xcodebuild \
            -workspace DeVrijeHond.xcworkspace \
            -scheme DeVrijeHond \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build | tail -40

  testflight:
    if: ${{ vars.IOS_RELEASE == 'true' }}
    runs-on: macos-26
    env:
      TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Distribution certificate into a temporary keychain.
      - uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_DIST_CERT_P12 }}
          p12-password: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}

      - name: Prebuild native project
        working-directory: apps/mobile
        run: pnpm exec expo prebuild -p ios --no-install
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'https://www.devrijehond.nl' }}
          EXPO_PUBLIC_AUTH_URL: ${{ vars.EXPO_PUBLIC_AUTH_URL || 'https://www.devrijehond.nl' }}

      - name: Install pods
        working-directory: apps/mobile/ios
        run: pod install

      # App Store Connect API key (.p8): a raw key for xcodebuild/altool, plus a
      # fastlane key file used to create the distribution provisioning profile.
      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          KEYFILE="$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8"
          echo "${{ secrets.ASC_API_KEY_P8 }}" | base64 --decode > "$KEYFILE"
          # fastlane's Token.from_json_file wants the raw .p8 contents in "key".
          jq -n \
            --arg kid "${{ secrets.ASC_KEY_ID }}" \
            --arg iss "${{ secrets.ASC_ISSUER_ID }}" \
            --arg key "$(cat "$KEYFILE")" \
            '{key_id:$kid, issuer_id:$iss, key:$key, in_house:false}' > /tmp/asc_api_key.json

      - name: Archive
        working-directory: apps/mobile/ios
        run: |
          xcodebuild \
            -workspace DeVrijeHond.xcworkspace \
            -scheme DeVrijeHond \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/DeVrijeHond.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }} \
            DEVELOPMENT_TEAM=${TEAM_ID} \
            archive

      # An App Manager API key can't drive xcodebuild's cloud distribution
      # signing (that needs Admin), which is why -allowProvisioningUpdates failed
      # with "Cloud signing permission error / No profiles". Instead create the
      # App Store profile via the API (fastlane sigh) and export with MANUAL
      # signing using the imported distribution certificate.
      - name: Export IPA (manual signing via API-created profile)
        working-directory: apps/mobile/ios
        run: |
          command -v fastlane >/dev/null || sudo gem install fastlane -N -q
          fastlane sigh \
            --api_key_path /tmp/asc_api_key.json \
            --app_identifier nl.devrijehond.app \
            --platform ios \
            --output_path /tmp/profiles
          PROFILE_PATH="$(ls /tmp/profiles/*.mobileprovision | head -1)"
          PROFILE_NAME="$(security cms -D -i "$PROFILE_PATH" | plutil -extract Name raw -)"
          echo "Exporting with profile: $PROFILE_NAME"
          cat > ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict><key>nl.devrijehond.app</key><string>${PROFILE_NAME}</string></dict>
            <key>uploadSymbols</key><true/>
          </dict></plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath build/DeVrijeHond.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ipa

      - uses: actions/upload-artifact@v4
        with:
          name: devrijehond-ios
          path: apps/mobile/ios/build/ipa/*.ipa
          if-no-files-found: error

      # altool finds the key at ~/.appstoreconnect/private_keys/AuthKey_<id>.p8
      # (written above), so no raw key needs passing here.
      - name: Upload to TestFlight
        working-directory: apps/mobile/ios
        run: |
          xcrun altool --upload-app --type ios \
            -f "$(ls build/ipa/*.ipa | head -1)" \
            --apiKey "${{ secrets.ASC_KEY_ID }}" \
            --apiIssuer "${{ secrets.ASC_ISSUER_ID }}"
