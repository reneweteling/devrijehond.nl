name: iOS build

# Builds the iOS app on a GitHub macOS runner (no EAS).
# - `compile`  : no-signing build that validates the native project + pods + JS
#                bundle. Always runs on dispatch.
# - `testflight`: signed archive + upload to TestFlight. Enable by setting the
#                 repo variable IOS_RELEASE=true and the Apple secrets (see
#                 docs/CI.md). Uses App Store Connect API-key signing.
on:
  workflow_dispatch:

jobs:
  compile:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prebuild native project
        working-directory: apps/mobile
        run: pnpm exec expo prebuild -p ios --no-install
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'https://www.devrijehond.nl' }}
          EXPO_PUBLIC_AUTH_URL: ${{ vars.EXPO_PUBLIC_AUTH_URL || 'https://www.devrijehond.nl' }}
      - name: Install pods
        working-directory: apps/mobile/ios
        run: pod install
      - name: Build (no code signing)
        working-directory: apps/mobile/ios
        run: |
          xcodebuild \
            -workspace DeVrijeHond.xcworkspace \
            -scheme DeVrijeHond \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build | tail -40

  testflight:
    if: ${{ vars.IOS_RELEASE == 'true' }}
    runs-on: macos-15
    env:
      TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Distribution certificate into a temporary keychain.
      - uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_DIST_CERT_P12 }}
          p12-password: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}

      - name: Prebuild native project
        working-directory: apps/mobile
        run: pnpm exec expo prebuild -p ios --no-install
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'https://www.devrijehond.nl' }}
          EXPO_PUBLIC_AUTH_URL: ${{ vars.EXPO_PUBLIC_AUTH_URL || 'https://www.devrijehond.nl' }}

      - name: Install pods
        working-directory: apps/mobile/ios
        run: pod install

      # App Store Connect API key (.p8) for automatic signing + upload.
      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.ASC_API_KEY_P8 }}" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Write ExportOptions.plist
        working-directory: apps/mobile/ios
        run: |
          cat > ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadSymbols</key><true/>
          </dict></plist>
          PLIST

      - name: Archive
        working-directory: apps/mobile/ios
        run: |
          xcodebuild \
            -workspace DeVrijeHond.xcworkspace \
            -scheme DeVrijeHond \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/DeVrijeHond.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }} \
            DEVELOPMENT_TEAM=${TEAM_ID} \
            archive

      - name: Export IPA
        working-directory: apps/mobile/ios
        run: |
          xcodebuild -exportArchive \
            -archivePath build/DeVrijeHond.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ipa \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }}

      - uses: actions/upload-artifact@v4
        with:
          name: devrijehond-ios
          path: apps/mobile/ios/build/ipa/*.ipa
          if-no-files-found: error

      # altool finds the key at ~/.appstoreconnect/private_keys/AuthKey_<id>.p8
      # (written above), so no raw key needs passing here.
      - name: Upload to TestFlight
        working-directory: apps/mobile/ios
        run: |
          xcrun altool --upload-app --type ios \
            -f "$(ls build/ipa/*.ipa | head -1)" \
            --apiKey "${{ secrets.ASC_KEY_ID }}" \
            --apiIssuer "${{ secrets.ASC_ISSUER_ID }}"
