name: Android build

# Builds the Android app on a free ubuntu runner (no EAS). Generates the native
# project with expo prebuild, then builds with Gradle. By default this produces
# an installable release APK signed with the prebuild debug key (fine for
# testing). For a Play Store AAB, provide the signing secrets (see docs/CI.md)
# and switch the Gradle task to bundleRelease.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - run: pnpm install --frozen-lockfile

      - name: Prebuild native project
        working-directory: apps/mobile
        run: pnpm exec expo prebuild -p android --no-install
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'https://www.devrijehond.nl' }}
          EXPO_PUBLIC_AUTH_URL: ${{ vars.EXPO_PUBLIC_AUTH_URL || 'https://www.devrijehond.nl' }}

      - name: Gradle build (release APK)
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: devrijehond-android
          path: apps/mobile/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
