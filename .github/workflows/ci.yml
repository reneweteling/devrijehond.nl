name: CI

# Lint, typecheck and build the web app on every push/PR. Runs on the free
# ubuntu runners; no EAS / cloud build involved.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm/action-setup reads the pinned version from package.json
      # ("packageManager": "pnpm@11.8.0").
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build web
        run: pnpm --filter web build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          NEXT_PUBLIC_APP_URL: https://www.devrijehond.nl
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
