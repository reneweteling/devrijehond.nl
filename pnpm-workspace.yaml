packages:
  - 'apps/*'
  - 'packages/*'

# pnpm 10+ does not run dependency build scripts unless they are explicitly
# allowed. These need their native/postinstall steps (prisma engines back the
# zen migrate CLI, esbuild + unrs-resolver ship native binaries, sharp powers
# the icon scripts).
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@zenstackhq/cli': true
  '@zenstackhq/orm': true
  better-sqlite3: true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true

# pnpm 11 ships a non-zero minimumReleaseAge by default, which rejects very
# recently published versions. We pin our own deps, so disable the wait.
minimumReleaseAge: 0
