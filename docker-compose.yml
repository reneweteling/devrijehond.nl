services:
  db:
    # Same image + arch as production (the postgis tags have no arm64 build, so
    # on Apple Silicon this runs amd64 under emulation — true prod parity).
    image: postgis/postgis:17-3.5-alpine
    platform: linux/amd64
    container_name: devrijehond-db
    environment:
      POSTGRES_USER: devrijehond
      POSTGRES_PASSWORD: devrijehond
      POSTGRES_DB: devrijehond
    ports:
      - '5544:5432'
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U devrijehond']
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  dbdata:
